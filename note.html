<script>
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a[href^="http"]');
    if(!a || !window.goatcounter || !window.goatcounter.count) return;
    var url;
    try { url = new URL(a.href); } catch(err){ return; }
    if(url.hostname === location.hostname) return;
    window.goatcounter.count({path: 'outbound/' + url.hostname, title: 'outbound: ' + a.href, event: true});
  }, true);
</script>

<script src="notes/manifest.js"></script>
<script>
  // Wait for DOMContentLoaded so the deferred marked/KaTeX <script> tags in
  // <head> are guaranteed to have already run (defer scripts execute in
  // order, before this event fires) -- otherwise a fast localhost fetch can
  // resolve and call marked.parse() before marked.min.js has loaded.
  document.addEventListener('DOMContentLoaded', function(){
    var slug = new URLSearchParams(location.search).get('slug');
    var meta = (window.NOTES || []).find(function(n){ return n.slug === slug; });
    var content = document.getElementById('content');

    if(!slug || !meta){
      document.getElementById('post-title').textContent = 'Note not found';
      content.innerHTML = '<p><a class="x" href="notes.html">&larr; back to notes</a></p>';
      return;
    }

    document.title = meta.title + ' · MESA notes';
    document.getElementById('pagetitle').textContent = meta.title + ' · MESA notes';
    document.getElementById('desc').setAttribute('content', meta.summary);

    // count.js loads async, so wait (briefly) for it before firing the
    // per-note pageview -- the default onload pageview is disabled via
    // no_onload since every note otherwise shares the /note.html path.
    (function sendPageview(triesLeft){
      if(window.goatcounter && window.goatcounter.count){
        window.goatcounter.count({path: 'note/' + slug, title: meta.title + ' · MESA notes'});
      } else if(triesLeft > 0){
        setTimeout(function(){ sendPageview(triesLeft - 1); }, 100);
      }
    })(20);
    document.getElementById('og-title').setAttribute('content', meta.title + ' · MESA notes');
    document.getElementById('og-desc').setAttribute('content', meta.summary);
    document.getElementById('og-url').setAttribute('content', 'https://www.spatialepi.org/note.html?slug=' + encodeURIComponent(meta.slug));
    document.getElementById('tw-title').setAttribute('content', meta.title + ' · MESA notes');
    document.getElementById('tw-desc').setAttribute('content', meta.summary);
    document.getElementById('crumb-title').textContent = '/ ' + meta.title;
    document.getElementById('post-title').textContent = meta.title;
    document.getElementById('post-date').textContent = meta.date;

    fetch('notes/' + slug + '.md', {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('not found'); return r.text(); })
      .then(function(md){
        // drop the leading "# Title" line -- the title is already rendered above as page chrome
        md = md.replace(/^#\s+.*\n+/, '');

        // Protect math from Markdown's own escaping (backslashes, underscores)
        // before handing off to marked, then restore it for KaTeX afterward.
        var mathStash = [];
        function stash(match){
          mathStash.push(match);
          return ' MATH' + (mathStash.length - 1) + ' ';
        }
        md = md.replace(/\$\$[\s\S]+?\$\$/g, stash);
        md = md.replace(/\\\[[\s\S]+?\\\]/g, stash);
        md = md.replace(/\$[^\n$]+?\$/g, stash);
        md = md.replace(/\\\([\s\S]+?\\\)/g, stash);

        var html = marked.parse(md);
        html = html.replace(/ MATH(\d+) /g, function(_, i){ return mathStash[+i]; });
        content.innerHTML = html;

        if(window.renderMathInElement){
          renderMathInElement(content, {
            delimiters: [
              {left:'$$', right:'$$', display:true},
              {left:'\\[', right:'\\]', display:true},
              {left:'$', right:'$', display:false},
              {left:'\\(', right:'\\)', display:false}
            ],
            throwOnError:false
          });
        }
      })
      .catch(function(){
        content.innerHTML = '<p class="sub">Could not load this note.</p>' +
          '<p><a class="x" href="notes.html">&larr; back to notes</a></p>';
      });
  });
</script>

<script>
  // Tab-away favicon: swap to the sad mesa while you're not looking.
  (function(){
    var icons = document.querySelectorAll('link[rel="icon"]');
    if(!icons.length) return;
    var originals = Array.prototype.map.call(icons, function(l){ return l.getAttribute('href'); });
    document.addEventListener('visibilitychange', function(){
      icons.forEach(function(link, i){
        var sad = link.getAttribute('sizes') === '16x16' ? 'favicon-16-sad.png' : 'favicon-32-sad.png';
        link.setAttribute('href', document.hidden ? sad : originals[i]);
      });
    });
  })();

  console.log('%c▲ MESA', 'color:#C8402F;font-weight:bold;font-family:monospace;font-size:14px');
  console.log('%cz = ∞ · p < 2.2e-16 (very significant find)', 'color:#9BA7AD;font-family:monospace');
</script>
