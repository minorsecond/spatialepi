<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Off the map · MESA</title>
<meta name="theme-color" content="#0e141a">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#E9E8E4;--ink:#16191C;--muted:#565C62;--faint:#878E94;--line-2:#B7B5AD;--accent:#C8402F}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;
    background:var(--bg);color:var(--ink);
    font-family:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace}
  h1{font-weight:500;font-size:clamp(1.3rem,4.5vw,1.9rem);margin:0 0 14px;letter-spacing:-.01em;line-height:1.3}
  p{color:var(--muted);font-size:.82rem;letter-spacing:.03em;margin:6px 0}
  .coord{color:var(--faint);text-transform:lowercase;letter-spacing:.06em;font-size:.72rem;margin-bottom:24px}
  .coord::before{content:"// "}
  a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line-2);padding-bottom:2px}
  a:hover{color:var(--accent);border-color:var(--accent)}
  @media(prefers-color-scheme:dark){
    :root{--bg:#0E141A;--ink:#E7ECEE;--muted:#9BA7AD;--faint:#69747A;--line-2:#33404A}
  }
</style>
</head>
<body>
  <div>
    <p class="coord">error 404 · no match</p>
    <h1>This point isn't on the map.</h1>
    <p><a href="/">← return to spatialepi.org</a></p>
  </div>
</body>
</html>
